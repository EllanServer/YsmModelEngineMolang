name: YsmModelEngineMolang
version: '${version}'
main: com.ysm.modelengine.molang.YsmMolangPlugin
api-version: '1.19'
load: POSTWORLD
author: OpenYSM
description: Runtime Molang keyframe support for ModelEngine
folia-supported: true
depend:
  - ModelEngine
softdepend:
  - MythicMobs
commands:
  ysmmolang:
    description: Manage asynchronous YSM model migration
    usage: /ysmmolang <migrate|status|paths>
    permission: ysmmolang.admin
permissions:
  ysmmolang.admin:
    description: Run and inspect YSM model migrations
    default: op
